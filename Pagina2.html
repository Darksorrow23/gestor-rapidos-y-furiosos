<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="image/logo.png">
    <title>Fast and Furious</title>
    <link rel="stylesheet" href="pagina2.css">

</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <img class="img_logo" src="image/logo.png" alt="Logo de Fast and Furious">
        </div>
        <nav>
            <ul class="nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="Pagina2.html">Movies</a></li>
                <li><a href="Pagina3.html">Characters</a></li>
            </ul>
        </nav>
    </header>

    <!-- HERO -->
    <section>
        <img class="img_fondo" src="image/pr_fondo.jpg" alt="Imagen de fondo Fast and Furious">
    </section>

    <section class="contenido">
        <h1>The Fast and Furious Universe</h1>
        <h3>Familia no se elige pero sí se protege. Conocé a los conductores más letales del mundo.</h3>
        <button class="btn_conocer" onclick="document.getElementById('registro').scrollIntoView({behavior:'smooth'})">
            Conocer a los integrantes
        </button>
    </section>

    <div id="registro">

        <div class="registro-section">
            <div class="txt_registro">
                <h1>Registro de miembros</h1>
                <p>Explorá, buscá y gestioná los personajes del universo Fast & Furious.</p>
            </div>

        
            <div class="toolbar">
                <input type="text" id="buscarInput" placeholder="Buscar personaje..." oninput="renderCards()">
                <select id="ordenSelect" onchange="renderCards()">
                    <option value="">— Ordenar —</option>
                    <option value="n">Nombre A→Z</option>
                    <option value="nd">Nombre Z→A</option>
                    <option value="e">Edad ↑</option>
                    <option value="ed">Edad ↓</option>
                </select>
                <button class="btn_agregar" onclick="mostrarFormulario()">+ Agregar personaje</button>
            </div>

        
            <div class="cards-grid" id="cardsGrid"></div>
        </div>

    
        <div class="formulario-seccion">
            <h2 id="formTitulo">Agregar personaje</h2>
            <div class="formulario">
                <label for="name">Nombre:</label>
                <input type="text" id="name" placeholder="ej. Dominic Toretto">

                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" placeholder="Escribe una descripción..."></textarea>

                <label for="habilidades">Habilidades</label>
                <input type="text" id="habilidades" placeholder="conducción extrema, mecánica, combate">

                <label for="edad">Edad:</label>
                <input type="number" id="edad" placeholder="42" min="0">

                <label for="altura">Altura (m):</label>
                <input type="number" id="altura" placeholder="1.85" step="0.01" min="0">

                <div class="villano-row">
                    <input type="checkbox" name="villano" id="villano">
                    <label for="villano">Es villano</label>
                </div>

                <p class="form-error" id="formError"></p>

                <button class="btn-guardar" onclick="agregar()">
                    <span id="btnLabel">Agregar</span>
                </button>
                <button class="btn-cancelar" id="btnCancelar" onclick="cancelarEdicion()">
                    Cancelar
                </button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

    </body>
</html>
